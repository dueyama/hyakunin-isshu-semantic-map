<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ベクトルは長いプロフィール表である</title>
  <desc id="desc">日常の印象が複数の数値になり、2次元、3次元、1536次元のベクトルとして表されることを示す模式図。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#202124" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #fbfaf6; }
      .panel { fill: #fffefa; stroke: #d7d0c2; stroke-width: 1.4; filter: url(#shadow); }
      .title { fill: #263c61; font: 700 27px sans-serif; }
      .subtitle { fill: #5d6066; font: 500 15px sans-serif; }
      .label { fill: #263c61; font: 700 18px sans-serif; }
      .small { fill: #5f625e; font: 500 14px sans-serif; }
      .tiny { fill: #74706a; font: 500 12px sans-serif; }
      .mono { fill: #4b2447; font: 700 17px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .axis { stroke: #a9aba4; stroke-width: 1.2; }
      .arrow { stroke: #526b55; stroke-width: 4; fill: none; marker-end: url(#arrowHead); }
      .barBg { fill: #eceff0; }
      .barA { fill: #263c61; }
      .barB { fill: #9a3f2f; }
      .barC { fill: #526b55; }
      .chip { fill: #f4f3ee; stroke: #d7d0c2; }
      .cell1 { fill: #263c61; opacity: 0.82; }
      .cell2 { fill: #9a3f2f; opacity: 0.72; }
      .cell3 { fill: #526b55; opacity: 0.72; }
      .cell4 { fill: #a77d35; opacity: 0.68; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#526b55"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="64" y="58">ベクトルとは、文章についた長いプロフィール表である</text>
  <text class="subtitle" x="64" y="86">人間が「辛い」「静か」と感じるような傾向を、モデルは名前のない数字の列として返す。</text>

  <rect class="panel" x="58" y="126" width="354" height="512" rx="8"/>
  <text class="label" x="88" y="170">日常の例</text>
  <text class="small" x="88" y="202">ランチの好みを比べる</text>
  <rect class="chip" x="88" y="236" width="270" height="54" rx="8"/>
  <text class="small" x="110" y="269">辛いものが好き</text>
  <rect class="chip" x="88" y="306" width="270" height="54" rx="8"/>
  <text class="small" x="110" y="339">麺類も好き</text>
  <rect class="chip" x="88" y="376" width="270" height="54" rx="8"/>
  <text class="small" x="110" y="409">甘いものは普通</text>
  <path class="arrow" d="M230 456 L230 512"/>
  <text class="small" x="100" y="556">印象をいくつかの軸で見る</text>
  <text class="tiny" x="100" y="582">ここでは説明用に名前を付けているだけ。</text>

  <rect class="panel" x="464" y="126" width="354" height="512" rx="8"/>
  <text class="label" x="494" y="170">短いベクトルなら描ける</text>
  <line class="axis" x1="534" y1="404" x2="748" y2="404"/>
  <line class="axis" x1="534" y1="404" x2="534" y2="218"/>
  <path class="arrow" d="M534 404 L690 280"/>
  <circle cx="690" cy="280" r="7" fill="#9a3f2f"/>
  <text class="mono" x="548" y="454">(1, 2)</text>
  <text class="small" x="548" y="482">横に1、縦に2の矢印</text>
  <rect class="chip" x="532" y="530" width="232" height="54" rx="8"/>
  <text class="mono" x="554" y="564">(1, 2, 5)</text>
  <text class="tiny" x="554" y="604">3次元なら高さも足せる。</text>

  <rect class="panel" x="870" y="126" width="354" height="512" rx="8"/>
  <text class="label" x="900" y="170">埋め込みは長い</text>
  <text class="small" x="900" y="202">一首 = 1536個の数字</text>
  <text class="mono" x="900" y="246">[0.21, -0.44, ...]</text>
  <g transform="translate(900 282)">
    <rect class="cell1" x="0" y="0" width="18" height="18" rx="3"/>
    <rect class="cell2" x="24" y="0" width="18" height="18" rx="3"/>
    <rect class="cell3" x="48" y="0" width="18" height="18" rx="3"/>
    <rect class="cell4" x="72" y="0" width="18" height="18" rx="3"/>
    <rect class="cell1" x="96" y="0" width="18" height="18" rx="3" opacity="0.54"/>
    <rect class="cell2" x="120" y="0" width="18" height="18" rx="3" opacity="0.54"/>
    <rect class="cell3" x="144" y="0" width="18" height="18" rx="3" opacity="0.54"/>
    <rect class="cell4" x="168" y="0" width="18" height="18" rx="3" opacity="0.54"/>
    <rect class="cell1" x="192" y="0" width="18" height="18" rx="3"/>
    <rect class="cell3" x="216" y="0" width="18" height="18" rx="3"/>
    <rect class="cell4" x="240" y="0" width="18" height="18" rx="3"/>
    <rect class="cell2" x="264" y="0" width="18" height="18" rx="3"/>
    <rect class="cell3" x="0" y="24" width="18" height="18" rx="3"/>
    <rect class="cell4" x="24" y="24" width="18" height="18" rx="3"/>
    <rect class="cell1" x="48" y="24" width="18" height="18" rx="3"/>
    <rect class="cell2" x="72" y="24" width="18" height="18" rx="3"/>
    <rect class="cell4" x="96" y="24" width="18" height="18" rx="3"/>
    <rect class="cell3" x="120" y="24" width="18" height="18" rx="3"/>
    <rect class="cell1" x="144" y="24" width="18" height="18" rx="3"/>
    <rect class="cell2" x="168" y="24" width="18" height="18" rx="3"/>
    <rect class="cell3" x="192" y="24" width="18" height="18" rx="3" opacity="0.55"/>
    <rect class="cell4" x="216" y="24" width="18" height="18" rx="3" opacity="0.55"/>
    <rect class="cell1" x="240" y="24" width="18" height="18" rx="3" opacity="0.55"/>
    <rect class="cell2" x="264" y="24" width="18" height="18" rx="3" opacity="0.55"/>
  </g>
  <text class="tiny" x="900" y="365">本当はこの小さな箱が1536個並ぶ。</text>
  <path class="arrow" d="M1045 396 L1045 452"/>
  <text class="small" x="900" y="498">人間には描けないので、</text>
  <text class="small" x="900" y="526">計算は高次元のまま行い、</text>
  <text class="small" x="900" y="554">表示だけ2次元へ落とす。</text>

  <rect x="86" y="676" width="1108" height="44" rx="8" fill="#f4f3ee" stroke="#d7d0c2"/>
  <text class="small" x="112" y="704">ポイント: 数字一つひとつに名前があるとは限らない。大事なのは、長い数字列どうしを比べられること。</text>
</svg>
