<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">地図から本文へ戻る読みの循環</title>
  <desc id="desc">意味空間の地図、気になる点、本文精読、文献確認を循環させる読み方。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#263c61" flood-opacity="0.14" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a77d35" />
    </marker>
  </defs>
  <rect width="1120" height="430" fill="#f4f3ee" />
  <rect x="42" y="40" width="1036" height="350" rx="22" fill="#fffdfa" stroke="#d8d2c8" />

  <text x="78" y="92" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="32" fill="#4b2447" font-weight="600">地図は、本文へ戻るためにある</text>
  <text x="80" y="124" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#5c5f63">数字で気になる場所を見つけ、歌を読み、文献を確かめ、また地図に戻る。</text>

  <g filter="url(#shadow)">
    <rect x="110" y="184" width="190" height="106" rx="14" fill="#eef3f0" stroke="#d8d2c8" />
    <rect x="358" y="184" width="190" height="106" rx="14" fill="#f9f4ee" stroke="#d8d2c8" />
    <rect x="606" y="184" width="190" height="106" rx="14" fill="#eef1f5" stroke="#d8d2c8" />
    <rect x="854" y="184" width="190" height="106" rx="14" fill="#f7f0ec" stroke="#d8d2c8" />
  </g>

  <text x="152" y="225" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="24" fill="#263c61">地図を見る</text>
  <text x="139" y="258" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">近い点・遠い点・</text>
  <text x="153" y="280" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">大きなジャンプ</text>

  <text x="394" y="225" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="24" fill="#8f3f5f">気になる</text>
  <text x="389" y="258" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">ここはなぜ近い?</text>
  <text x="391" y="280" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">なぜ急に離れる?</text>

  <text x="654" y="225" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="24" fill="#526b55">歌に戻る</text>
  <text x="641" y="258" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">本文・語句・部立・</text>
  <text x="661" y="280" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">注釈を読む</text>

  <text x="901" y="225" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="24" fill="#9a3f2f">確かめる</text>
  <text x="891" y="258" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">先行研究・出典・</text>
  <text x="910" y="280" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#5c5f63">伝本を見る</text>

  <path d="M306 237 L350 237" stroke="#a77d35" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M554 237 L598 237" stroke="#a77d35" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M802 237 L846 237" stroke="#a77d35" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M950 306 C874 360 250 360 196 302" fill="none" stroke="#a77d35" stroke-width="4" marker-end="url(#arrow)" opacity="0.8" />

  <circle cx="172" cy="158" r="8" fill="#263c61" />
  <circle cx="202" cy="152" r="6" fill="#8f3f5f" />
  <circle cx="225" cy="166" r="5" fill="#526b55" />
  <circle cx="928" cy="156" r="7" fill="#d9b66f" />
  <text x="366" y="356" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#74706a">地図だけで終わらせない。数字が示した場所を、もう一度読む。</text>
</svg>
