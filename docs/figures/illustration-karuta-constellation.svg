<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">百人一首を夜空の地図として見る挿絵</title>
  <desc id="desc">カルタ札のような百首が、夜空の星座のような意味空間へ移っていく様子。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202438" />
      <stop offset="0.55" stop-color="#2f3d5e" />
      <stop offset="1" stop-color="#efe7d8" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111827" flood-opacity="0.24" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9b66f" />
    </marker>
  </defs>
  <rect width="1120" height="430" rx="0" fill="#f4f3ee" />
  <rect x="42" y="36" width="1036" height="358" rx="22" fill="url(#sky)" />

  <g opacity="0.86">
    <circle cx="710" cy="92" r="2.2" fill="#fffdfa" />
    <circle cx="804" cy="76" r="1.8" fill="#fffdfa" />
    <circle cx="916" cy="118" r="2.4" fill="#fffdfa" />
    <circle cx="977" cy="78" r="1.5" fill="#fffdfa" />
    <circle cx="742" cy="218" r="2.1" fill="#fffdfa" />
    <circle cx="884" cy="246" r="1.9" fill="#fffdfa" />
    <circle cx="1010" cy="210" r="2.6" fill="#fffdfa" />
    <circle cx="826" cy="327" r="2.3" fill="#fffdfa" />
    <circle cx="959" cy="327" r="1.7" fill="#fffdfa" />
  </g>

  <g filter="url(#softShadow)">
    <rect x="100" y="96" width="118" height="172" rx="10" fill="#fffdfa" stroke="#d8d2c8" />
    <rect x="138" y="126" width="118" height="172" rx="10" fill="#fffdfa" stroke="#d8d2c8" />
    <rect x="176" y="156" width="118" height="172" rx="10" fill="#fffdfa" stroke="#d8d2c8" />
  </g>
  <text x="131" y="149" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="24" fill="#4b2447">百首</text>
  <text x="168" y="192" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="20" fill="#263c61">歌の札</text>
  <text x="205" y="225" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="18" fill="#526b55">一首ずつ</text>
  <text x="204" y="257" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="18" fill="#526b55">場所を持つ</text>

  <path d="M330 216 C430 170 508 170 604 215" fill="none" stroke="#d9b66f" stroke-width="5" marker-end="url(#arrow)" opacity="0.92" />
  <text x="396" y="157" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#fffdfa">札から地図へ</text>

  <g>
    <path d="M690 156 L776 112 L865 156 L944 125 L1010 188 L934 264 L820 246 L724 296 Z" fill="none" stroke="#d9b66f" stroke-width="2.6" stroke-dasharray="7 8" opacity="0.78" />
    <circle cx="690" cy="156" r="10" fill="#fffdfa" />
    <circle cx="776" cy="112" r="12" fill="#d9b66f" />
    <circle cx="865" cy="156" r="9" fill="#fffdfa" />
    <circle cx="944" cy="125" r="11" fill="#c9866a" />
    <circle cx="1010" cy="188" r="9" fill="#fffdfa" />
    <circle cx="934" cy="264" r="13" fill="#5f7a62" />
    <circle cx="820" cy="246" r="10" fill="#fffdfa" />
    <circle cx="724" cy="296" r="12" fill="#8f6f9c" />
  </g>
  <text x="690" y="344" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="30" fill="#fffdfa" font-weight="600">百首を、星座のように眺める</text>
  <text x="692" y="374" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#f4efe5">近い星を結ぶように、近い歌・遠い歌・急に跳ぶ場所を探す。</text>
</svg>
