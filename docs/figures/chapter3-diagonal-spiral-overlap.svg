<text x="90" y="494" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="700" letter-spacing="0">斜めつづら折り</text>
<rect x="260" y="474" width="470" height="28" fill="#eee8dc" rx="14"/>
<rect x="260" y="474" width="423.0" height="28" fill="#496f86" rx="14"/>
