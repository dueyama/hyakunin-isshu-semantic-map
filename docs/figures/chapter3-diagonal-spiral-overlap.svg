<text x="750" y="494" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0"/>
<text x="90" y="540" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="700" letter-spacing="0">逆斜めつづら折り</text>
<rect x="260" y="520" width="470" height="28" fill="#eee8dc" rx="14"/>
<rect x="260" y="520" width="423.0" height="28" fill="#496f86" rx="14"/>
<text x="673.0" y="540" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" font-weight="700" text-anchor="end" letter-spacing="0">27</text>
<text x="750" y="540" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0"/>
<text x="90" y="586" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="700" letter-spacing="0">行つづら折り</text>
<rect x="260" y="566" width="470" height="28" fill="#eee8dc" rx="14"/>
<rect x="260" y="566" width="407.3333333333333" height="28" fill="#496f86" rx="14"/>
<text x="657.3333333333333" y="586" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" font-weight="700" text-anchor="end" letter-spacing="0">26</text>
<text x="750" y="586" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0"/>
<text x="90" y="632" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="700" letter-spacing="0">列つづら折り</text>
<rect x="260" y="612" width="470" height="28" fill="#eee8dc" rx="14"/>
<rect x="260" y="612" width="407.3333333333333" height="28" fill="#496f86" rx="14"/>
<text x="657.3333333333333" y="632" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" font-weight="700" text-anchor="end" letter-spacing="0">26</text>
<text x="750" y="632" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0"/>
<text x="90" y="678" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" font-weight="700" letter-spacing="0">螺旋置き</text>
<rect x="260" y="658" width="470" height="28" fill="#eee8dc" rx="14"/>
<rect x="260" y="658" width="344.6666666666667" height="28" fill="#9a3f2f" rx="14"/>
<text x="594.6666666666667" y="678" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" font-weight="700" text-anchor="end" letter-spacing="0">22</text>
<text x="750" y="678" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">小倉螺旋</text>
<line x1="88" y1="712" x2="1160" y2="712" stroke="#ded6c9" stroke-width="1.2"/>
<text x="90" y="744" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" letter-spacing="0">8近傍では、螺旋置きの重なりは 55組 / 321組。最大は 行つづら折り の 85組。</text>
<text x="90" y="772" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">全97首から任意のペアを選ぶだけなら、上下左右の期待重なりは約6.1組。観測値はその約3.6倍。</text>
</svg>
