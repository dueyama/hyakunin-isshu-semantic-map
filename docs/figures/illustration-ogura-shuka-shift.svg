<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">小倉百人一首と百人秀歌のずれ</title>
  <desc id="desc">似た二つの歌集が、共通する多くの歌と少数の差し替え歌を持つ様子。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#263c61" flood-opacity="0.14" />
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa" />
      <stop offset="1" stop-color="#eef1ef" />
    </linearGradient>
  </defs>
  <rect width="1120" height="430" fill="#f4f3ee" />
  <rect x="42" y="40" width="1036" height="350" rx="22" fill="url(#bg)" stroke="#d8d2c8" />

  <text x="78" y="92" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="32" fill="#4b2447" font-weight="600">ほとんど同じ。でも、少し違う。</text>
  <text x="80" y="124" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#5c5f63">小倉百人一首と百人秀歌は、多くを共有しながら、数首の差し替えと並びの違いを持つ。</text>

  <g filter="url(#shadow)">
    <rect x="100" y="178" width="340" height="124" rx="14" fill="#fffdfa" stroke="#d8d2c8" />
    <rect x="680" y="178" width="340" height="124" rx="14" fill="#fffdfa" stroke="#d8d2c8" />
  </g>
  <text x="126" y="216" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="27" fill="#263c61">小倉百人一首</text>
  <text x="706" y="216" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="27" fill="#8f3f5f">百人秀歌</text>
  <text x="128" y="252" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#5c5f63">よく知られた百首の配列</text>
  <text x="708" y="252" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#5c5f63">よく似た歌群を持つ別の姿</text>

  <g opacity="0.92">
    <path d="M446 206 C520 162 598 162 674 206" fill="none" stroke="#526b55" stroke-width="3" />
    <path d="M446 242 C520 242 598 242 674 242" fill="none" stroke="#526b55" stroke-width="3" stroke-dasharray="8 8" />
    <path d="M446 278 C520 324 598 324 674 278" fill="none" stroke="#526b55" stroke-width="3" />
  </g>
  <text x="506" y="187" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#526b55">共通する歌</text>
  <text x="503" y="318" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#526b55">順序のずれ</text>

  <g>
    <circle cx="170" cy="333" r="15" fill="#263c61" />
    <circle cx="212" cy="333" r="15" fill="#263c61" opacity="0.82" />
    <circle cx="254" cy="333" r="15" fill="#c9866a" />
    <circle cx="296" cy="333" r="15" fill="#263c61" opacity="0.82" />
    <circle cx="338" cy="333" r="15" fill="#d9b66f" />
    <text x="126" y="374" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#74706a">色の違う点が、差し替えや注目候補。</text>

    <circle cx="750" cy="333" r="15" fill="#8f3f5f" />
    <circle cx="792" cy="333" r="15" fill="#8f3f5f" opacity="0.82" />
    <circle cx="834" cy="333" r="15" fill="#526b55" />
    <circle cx="876" cy="333" r="15" fill="#8f3f5f" opacity="0.82" />
    <circle cx="918" cy="333" r="15" fill="#d9b66f" />
  </g>

  <text x="468" y="98" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#9a3f2f">違いは小さい。だからこそ、そこに手がかりがある。</text>
</svg>
