<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">意味空間の考え方</title>
  <desc id="desc">和歌の短い本文を数値の住所へ変換し、近い歌を近くに置く考え方を示す模式図。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#263c61" flood-opacity="0.16" />
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa" />
      <stop offset="1" stop-color="#f1efe7" />
    </linearGradient>
    <linearGradient id="map" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3f0" />
      <stop offset="1" stop-color="#f9f4ee" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526b55" />
    </marker>
  </defs>

  <rect width="1120" height="620" fill="#f4f3ee" />

  <text x="56" y="62" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="34" fill="#4b2447" font-weight="600">意味空間とは、歌に「住所」を与える地図である</text>
  <text x="58" y="98" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5c5f63">本文を数値に変換し、似た歌が近くに来るように配置する。近さは答えではなく、読み戻すための手がかり。</text>

  <g filter="url(#shadow)">
    <rect x="58" y="148" width="270" height="110" rx="8" fill="url(#paper)" stroke="#d8d2c8" />
    <rect x="58" y="280" width="270" height="110" rx="8" fill="url(#paper)" stroke="#d8d2c8" />
    <rect x="58" y="412" width="270" height="110" rx="8" fill="url(#paper)" stroke="#d8d2c8" />
  </g>
  <text x="82" y="181" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#263c61" font-weight="700">歌A: 恋の嘆き</text>
  <text x="82" y="214" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="22" fill="#202124">忘れられたる</text>
  <text x="82" y="241" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="22" fill="#202124">身を思う歌</text>

  <text x="82" y="313" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#8f3f5f" font-weight="700">歌B: 秋の景色</text>
  <text x="82" y="346" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="22" fill="#202124">月・紅葉・露の</text>
  <text x="82" y="373" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="22" fill="#202124">気配を持つ歌</text>

  <text x="82" y="445" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#526b55" font-weight="700">歌C: 旅と別れ</text>
  <text x="82" y="478" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="22" fill="#202124">遠くへ行く心や</text>
  <text x="82" y="505" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="22" fill="#202124">離れてゆく時間</text>

  <path d="M350 203 C404 203 415 203 468 203" fill="none" stroke="#526b55" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M350 335 C404 335 415 335 468 335" fill="none" stroke="#526b55" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M350 467 C404 467 415 467 468 467" fill="none" stroke="#526b55" stroke-width="4" marker-end="url(#arrow)" />

  <g filter="url(#shadow)">
    <rect x="476" y="174" width="210" height="82" rx="8" fill="#fffdfa" stroke="#d8d2c8" />
    <rect x="476" y="306" width="210" height="82" rx="8" fill="#fffdfa" stroke="#d8d2c8" />
    <rect x="476" y="438" width="210" height="82" rx="8" fill="#fffdfa" stroke="#d8d2c8" />
  </g>
  <text x="500" y="205" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#74706a">数値の住所</text>
  <text x="500" y="234" font-family="Menlo,Consolas,monospace" font-size="16" fill="#263c61">[0.21, -0.44, ...]</text>
  <text x="500" y="337" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#74706a">数値の住所</text>
  <text x="500" y="366" font-family="Menlo,Consolas,monospace" font-size="16" fill="#8f3f5f">[-0.18, 0.32, ...]</text>
  <text x="500" y="469" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#74706a">数値の住所</text>
  <text x="500" y="498" font-family="Menlo,Consolas,monospace" font-size="16" fill="#526b55">[0.08, 0.51, ...]</text>

  <path d="M706 308 C738 308 752 308 782 308" fill="none" stroke="#526b55" stroke-width="4" marker-end="url(#arrow)" />

  <g filter="url(#shadow)">
    <rect x="792" y="142" width="270" height="392" rx="14" fill="url(#map)" stroke="#d8d2c8" />
  </g>
  <text x="824" y="180" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#4b2447" font-weight="700">意味空間の地図</text>
  <line x1="830" y1="474" x2="1020" y2="474" stroke="#b7b1a5" stroke-width="2" />
  <line x1="838" y1="214" x2="838" y2="486" stroke="#b7b1a5" stroke-width="2" />
  <text x="1010" y="502" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#74706a">PC1</text>
  <text x="804" y="220" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#74706a">PC2</text>

  <circle cx="903" cy="279" r="13" fill="#263c61" opacity="0.92" />
  <circle cx="926" cy="296" r="10" fill="#263c61" opacity="0.78" />
  <circle cx="887" cy="309" r="9" fill="#263c61" opacity="0.62" />
  <text x="943" y="292" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#263c61">恋の近所</text>

  <circle cx="970" cy="391" r="12" fill="#8f3f5f" opacity="0.88" />
  <circle cx="942" cy="414" r="9" fill="#8f3f5f" opacity="0.7" />
  <circle cx="988" cy="430" r="8" fill="#8f3f5f" opacity="0.6" />
  <text x="907" y="448" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#8f3f5f">秋の近所</text>

  <circle cx="882" cy="399" r="12" fill="#526b55" opacity="0.9" />
  <circle cx="861" cy="430" r="9" fill="#526b55" opacity="0.68" />
  <text x="866" y="374" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#526b55">旅・別れ</text>

  <path d="M902 279 L970 391 L882 399" fill="none" stroke="#a77d35" stroke-width="3" stroke-dasharray="8 7" opacity="0.75" />
  <text x="818" y="522" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#74706a">点の近さを見る。線で順番の流れを見る。</text>
</svg>
