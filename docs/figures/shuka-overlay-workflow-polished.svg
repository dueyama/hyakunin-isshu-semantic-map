<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500" role="img">
<defs>
  <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
    <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#202124" flood-opacity="0.11"/>
  </filter>
  <linearGradient id="barGloss" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect width="1280" height="500" fill="#fbfaf7"/>
<rect x="34" y="34" width="1212" height="432" rx="18" fill="#fffdf8" stroke="#ded6c9" filter="url(#shadow)"/>
<text x="78" y="82" fill="#526b55" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="32" font-weight="700" letter-spacing="0">小倉三首を入れる検査手順</text>
<text x="78" y="116" fill="#6f6a62" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" letter-spacing="0">この図は結果ではなく、次の棒グラフを作るまでの処理手順である。</text>
<line x1="282" y1="277.0" x2="290" y2="277.0" stroke="#ded6c9" stroke-width="5"/>
<circle cx="286.0" cy="277.0" r="7" fill="#a77d35" stroke="#fffdf8" stroke-width="2"/>
<line x1="510" y1="277.0" x2="518" y2="277.0" stroke="#ded6c9" stroke-width="5"/>
<circle cx="514.0" cy="277.0" r="7" fill="#a77d35" stroke="#fffdf8" stroke-width="2"/>
<line x1="738" y1="277.0" x2="746" y2="277.0" stroke="#ded6c9" stroke-width="5"/>
<circle cx="742.0" cy="277.0" r="7" fill="#a77d35" stroke="#fffdf8" stroke-width="2"/>
<line x1="966" y1="277.0" x2="974" y2="277.0" stroke="#ded6c9" stroke-width="5"/>
<circle cx="970.0" cy="277.0" r="7" fill="#a77d35" stroke="#fffdf8" stroke-width="2"/>
<rect x="70" y="178" width="204" height="198" fill="#fffefa" stroke="#ded6c9" rx="14" stroke-width="1.2"/>
<circle cx="104" cy="212" r="20" fill="#526b55" stroke="#fffdf8" stroke-width="2"/>
<text x="104" y="220" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0">1</text>
<text x="134" y="218" fill="#526b55" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="21" font-weight="700" letter-spacing="0">基準を決める</text>
<text x="94" y="260" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">百人秀歌の</text>
<text x="94" y="285" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">10×10配置を</text>
<text x="94" y="310" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">出発点にする。</text>
<rect x="298" y="178" width="204" height="198" fill="#fffefa" stroke="#ded6c9" rx="14" stroke-width="1.2"/>
<circle cx="332" cy="212" r="20" fill="#263c61" stroke="#fffdf8" stroke-width="2"/>
<text x="332" y="220" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0">2</text>
<text x="362" y="218" fill="#263c61" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="21" font-weight="700" letter-spacing="0">97首を固定</text>
<text x="322" y="260" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">両方にある歌は</text>
<text x="322" y="285" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">百人秀歌側の</text>
<text x="322" y="310" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">セルに置く。</text>
<rect x="526" y="178" width="204" height="198" fill="#fffefa" stroke="#ded6c9" rx="14" stroke-width="1.2"/>
<circle cx="560" cy="212" r="20" fill="#4b2447" stroke="#fffdf8" stroke-width="2"/>
<text x="560" y="220" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0">3</text>
<text x="590" y="218" fill="#4b2447" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="21" font-weight="700" letter-spacing="0">一首を枠外へ</text>
<text x="550" y="260" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">S053 / S073</text>
<text x="550" y="285" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">S076 / S090</text>
<text x="550" y="310" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">から一首を外す。</text>
<rect x="754" y="178" width="204" height="198" fill="#fffefa" stroke="#ded6c9" rx="14" stroke-width="1.2"/>
<circle cx="788" cy="212" r="20" fill="#9a3f2f" stroke="#fffdf8" stroke-width="2"/>
<text x="788" y="220" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0">4</text>
<text x="818" y="218" fill="#9a3f2f" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="21" font-weight="700" letter-spacing="0">三首を入れる</text>
<text x="778" y="260" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">H074 / H099</text>
<text x="778" y="285" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">H100を残りの</text>
<text x="778" y="310" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">三セルへ6通り。</text>
<rect x="982" y="178" width="204" height="198" fill="#fffefa" stroke="#ded6c9" rx="14" stroke-width="1.2"/>
<circle cx="1016" cy="212" r="20" fill="#a77d35" stroke="#fffdf8" stroke-width="2"/>
<text x="1016" y="220" fill="#fffdf8" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0">5</text>
<text x="1046" y="218" fill="#a77d35" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="21" font-weight="700" letter-spacing="0">隣を集計する</text>
<text x="1006" y="260" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">上下左右と</text>
<text x="1006" y="285" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">8近傍の隣を</text>
<text x="1006" y="310" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="15" letter-spacing="0">まとめて平均する。</text>
<rect x="78" y="412" width="1124" height="54" fill="#f4f1ea" stroke="#ded6c9" rx="14"/>
<text x="104" y="446" fill="#202124" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="17" letter-spacing="0">ここで得た各条件の値を、次の図2-5の棒グラフで比べる。</text>
</svg>
