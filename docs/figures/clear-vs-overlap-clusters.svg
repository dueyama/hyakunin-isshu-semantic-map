<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">くっきり分離する意味空間と重なり合う意味空間の模式図</title>
  <desc id="desc">左は主題ごとの点群が離れている例、右は主題の点群が重なっている例を示す模式図。</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#27333b" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f8f4eb; }
      .panel { fill: #fffdf7; stroke: #d9cfbf; stroke-width: 1.3; filter: url(#softShadow); }
      .title { font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; font-size: 28px; fill: #4b2447; font-weight: 700; }
      .subtitle { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 16px; fill: #656b70; }
      .axis { stroke: #a9a299; stroke-width: 1.2; }
      .axisText { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 13px; fill: #7a746e; }
      .label { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 16px; fill: #34373b; font-weight: 700; }
      .small { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 14px; fill: #656b70; }
      .love { fill: #a64f62; }
      .season { fill: #5a7858; }
      .travel { fill: #355f8f; }
      .mist { fill-opacity: 0.13; stroke-opacity: 0.3; stroke-width: 2; }
      .dot { stroke: #fffdf7; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="920" height="520"/>
  <text x="460" y="48" text-anchor="middle" class="title">「くっきり分かれる」とは、どういう見え方か</text>
  <text x="460" y="78" text-anchor="middle" class="subtitle">実データではなく、意味空間を見るための目安としてのぽんち絵</text>

  <rect x="54" y="112" width="390" height="342" rx="8" class="panel"/>
  <rect x="476" y="112" width="390" height="342" rx="8" class="panel"/>

  <text x="249" y="150" text-anchor="middle" class="label">期待したくなる図</text>
  <text x="249" y="176" text-anchor="middle" class="small">主題ごとに島が離れている</text>
  <text x="671" y="150" text-anchor="middle" class="label">実際によくある図</text>
  <text x="671" y="176" text-anchor="middle" class="small">境界がにじんで重なり合う</text>

  <line x1="100" y1="398" x2="394" y2="398" class="axis"/>
  <line x1="100" y1="398" x2="100" y2="210" class="axis"/>
  <text x="390" y="420" text-anchor="end" class="axisText">意味の方向A</text>
  <text x="85" y="218" text-anchor="end" class="axisText">意味の方向B</text>

  <line x1="522" y1="398" x2="816" y2="398" class="axis"/>
  <line x1="522" y1="398" x2="522" y2="210" class="axis"/>
  <text x="812" y="420" text-anchor="end" class="axisText">意味の方向A</text>
  <text x="507" y="218" text-anchor="end" class="axisText">意味の方向B</text>

  <ellipse cx="178" cy="264" rx="58" ry="42" class="love mist" stroke="#a64f62"/>
  <ellipse cx="322" cy="246" rx="58" ry="42" class="season mist" stroke="#5a7858"/>
  <ellipse cx="254" cy="350" rx="58" ry="42" class="travel mist" stroke="#355f8f"/>

  <g class="dot love">
    <circle cx="154" cy="248" r="8"/><circle cx="178" cy="232" r="7"/><circle cx="202" cy="254" r="8"/>
    <circle cx="166" cy="276" r="7"/><circle cx="190" cy="286" r="8"/><circle cx="220" cy="270" r="6"/>
    <circle cx="142" cy="270" r="6"/><circle cx="188" cy="254" r="7"/>
  </g>
  <g class="dot season">
    <circle cx="298" cy="232" r="8"/><circle cx="326" cy="220" r="7"/><circle cx="350" cy="244" r="8"/>
    <circle cx="310" cy="264" r="7"/><circle cx="338" cy="278" r="8"/><circle cx="364" cy="260" r="6"/>
    <circle cx="286" cy="256" r="6"/><circle cx="326" cy="248" r="7"/>
  </g>
  <g class="dot travel">
    <circle cx="230" cy="332" r="8"/><circle cx="252" cy="316" r="7"/><circle cx="278" cy="340" r="8"/>
    <circle cx="242" cy="362" r="7"/><circle cx="270" cy="374" r="8"/><circle cx="296" cy="356" r="6"/>
    <circle cx="218" cy="358" r="6"/><circle cx="258" cy="344" r="7"/>
  </g>

  <text x="155" y="218" text-anchor="middle" class="small" fill="#a64f62">恋</text>
  <text x="350" y="208" text-anchor="middle" class="small" fill="#5a7858">季節</text>
  <text x="296" y="404" text-anchor="middle" class="small" fill="#355f8f">旅・別れ</text>

  <ellipse cx="652" cy="292" rx="96" ry="64" class="love mist" stroke="#a64f62"/>
  <ellipse cx="706" cy="270" rx="94" ry="66" class="season mist" stroke="#5a7858"/>
  <ellipse cx="680" cy="338" rx="98" ry="60" class="travel mist" stroke="#355f8f"/>

  <g class="dot love">
    <circle cx="608" cy="262" r="8"/><circle cx="632" cy="238" r="7"/><circle cx="664" cy="270" r="8"/>
    <circle cx="628" cy="302" r="7"/><circle cx="688" cy="294" r="8"/><circle cx="724" cy="256" r="6"/>
    <circle cx="590" cy="302" r="6"/><circle cx="658" cy="322" r="7"/>
  </g>
  <g class="dot season">
    <circle cx="690" cy="224" r="8"/><circle cx="724" cy="238" r="7"/><circle cx="758" cy="266" r="8"/>
    <circle cx="704" cy="284" r="7"/><circle cx="742" cy="306" r="8"/><circle cx="642" cy="276" r="6"/>
    <circle cx="778" cy="292" r="6"/><circle cx="676" cy="252" r="7"/>
  </g>
  <g class="dot travel">
    <circle cx="620" cy="344" r="8"/><circle cx="652" cy="362" r="7"/><circle cx="690" cy="342" r="8"/>
    <circle cx="728" cy="356" r="7"/><circle cx="758" cy="334" r="8"/><circle cx="676" cy="318" r="6"/>
    <circle cx="706" cy="386" r="6"/><circle cx="604" cy="330" r="7"/>
  </g>

  <text x="600" y="224" text-anchor="middle" class="small" fill="#a64f62">恋</text>
  <text x="770" y="226" text-anchor="middle" class="small" fill="#5a7858">季節</text>
  <text x="768" y="390" text-anchor="middle" class="small" fill="#355f8f">旅・別れ</text>

  <text x="249" y="478" text-anchor="middle" class="subtitle">色ごとの点群が離れていれば、分離は分かりやすい</text>
  <text x="671" y="478" text-anchor="middle" class="subtitle">和歌では、主題や語り口が混ざって見えることが多い</text>
</svg>
